workflows:
  android_debug_placeholder:
    name: Free Style Android Placeholder
    max_build_duration: 60
    instance_type: linux_standard
    environment:
      vars:
        GODOT_VERSION: "4.2.2"
    scripts:
      - name: Show placeholder status
        script: |
          echo "Free Style Codemagic workflow placeholder"
          echo "Android build cannot proceed until export_presets.cfg and signing secrets are configured."
    artifacts:
      - build/**/*.apk
      - build/**/*.aab
